apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: daniyal142khan/legal-insight-backend:latest
        ports:
        - containerPort: 5000
        env:
        # ConfigMap Variables
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: PORT
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: NODE_ENV
        - name: MONGO_URI
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: MONGO_URI
        - name: RAG_API_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: RAG_API_URL
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: FRONTEND_URL
        - name: EMAIL_HOST
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: EMAIL_HOST
        - name: EMAIL_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: EMAIL_PORT
        - name: EMAIL_USER
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: EMAIL_USER
        - name: EMAIL_FROM
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: EMAIL_FROM
        - name: EMAIL_FROM_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: EMAIL_FROM_NAME
        # Secret Variables
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: JWT_SECRET
        - name: EMAIL_PASS
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: EMAIL_PASS
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: GEMINI_API_KEY
        - name: MY_INTERNAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: MY_INTERNAL_API_KEY
        - name: NEWS_API_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: NEWS_API_KEY

---

apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP

