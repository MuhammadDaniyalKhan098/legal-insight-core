server {
    listen 80;
    server_name localhost;
    
    # Where Nginx looks for our built React files
    root /usr/share/nginx/html;
    index index.html;

    # The Magic Fix:
    location / {
        # 1. Try to find the exact file ($uri)
        # 2. Try to find a directory with that name ($uri/)
        # 3. If neither exists, serve index.html and let React handle the route!
        try_files $uri $uri/ /index.html;
    }
}