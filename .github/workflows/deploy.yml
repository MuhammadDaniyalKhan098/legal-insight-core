name: Legal Insight CI/CD Pipeline

# This tells GitHub to run this script ONLY when you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # STAGE 1: CONTINUOUS INTEGRATION (TESTING)
  # ==========================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          npm install
          npm run test

  # ==========================================
  # STAGE 2: CONTINUOUS DELIVERY (BUILD & PUSH)
  # ==========================================
  build-and-push:
    needs: test # This guarantees the build WON'T start if the test fails!
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: daniyal142khan/legal-insight-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: daniyal142khan/legal-insight-frontend:latest

      - name: Build and Push RAG Service
        uses: docker/build-push-action@v4
        with:
          context: ./rag_service
          push: true
          tags: daniyal142khan/legal-insight-rag:latest

  # ==========================================
  # STAGE 3: CONTINUOUS DEPLOYMENT (AWS UPDATE)
  # ==========================================
  deploy:
    needs: build-and-push # Only deploy if the new images were successfully pushed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. Securely copy our updated K8s YAML files to the EC2 server
      - name: Copy K8s files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/*"
          target: "/home/ubuntu/legal-insight-core"

      # 2. Securely SSH into the server and run the Kubernetes commands
      - name: Execute Kubernetes Commands via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Apply any changes made to the Kubernetes YAML files (like ConfigMaps)
            kubectl apply -f /home/ubuntu/legal-insight-core/k8s/
            
            # Force the Deployments to restart, pulling the brand-new Docker images!
            kubectl rollout restart deployment frontend backend rag-service