name: Legal Insight CI/CD Pipeline

# ==========================================
# THE TRIGGER
# ==========================================
# This section dictates WHEN the pipeline wakes up.
on:
  push:
    branches:
      - main
    # PATH FILTERING: The pipeline will IGNORE pushes if the only changed 
    # files match this list. This separates application code from 
    # infrastructure/local-testing code, saving time and compute resources.
    paths-ignore:
      - 'terraform/**'
      - 'README.md'
      - '.gitignore'
      - 'docker-compose.yml'

jobs:
  # ==========================================
  # STAGE 1: CONTINUOUS INTEGRATION (TESTING)
  # ==========================================
  test:
    # Provisions a temporary Linux server hosted by GitHub
    runs-on: ubuntu-latest
    steps:
      # Step 1: Fetches the latest code from the 'main' branch and 
      # places it on the temporary server's hard drive.
      - name: Checkout Code
        uses: actions/checkout@v3

      # ==========================================
      # DEVSECOPS: TRIVY VULNERABILITY SCANNER
      # ==========================================
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'             # Scans the file system (your code and dependencies)
          ignore-unfixed: true        # Ignores vulnerabilities that don't have a patch yet
          format: 'table'             # Prints a beautiful table in the GitHub Actions logs
          severity: 'CRITICAL,HIGH'   # Only fails the pipeline if a massive vulnerability is found
      
      # ==========================================
      # DEVSECOPS: SEMGREP SAST SCANNER
      # ==========================================
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          # This tells Semgrep to use the official OWASP Top 10 security rules
          # specifically tailored for Python, Node.js, and React.
          config: p/owasp-top-ten
      
      # Step 2: Installs the Node.js runtime on the temporary server
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      # Step 3: Navigates into the backend folder, installs dependencies, 
      # and runs the test suite. If this fails, the entire pipeline crashes.
      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          npm install
          npm run test

  # ==========================================
  # STAGE 2: CONTINUOUS DELIVERY (BUILD & PUSH)
  # ==========================================
  build-and-push:
    # DEPENDENCY: This ensures the build phase waits for the 'test' phase. 
    # It will not execute if the tests fail.
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Authenticates with Docker Hub using secure tokens stored in GitHub Secrets.
      # This allows the runner to upload images to our private/public registry.
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Compiles the Node.js Dockerfile and pushes it to the registry.
      # Tags it as 'latest' to ensure Kubernetes always pulls this exact version.
      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: daniyal142khan/legal-insight-backend:latest

      # Compiles the React/Nginx Dockerfile
      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: daniyal142khan/legal-insight-frontend:latest

      # Compiles the FastAPI/RAG Dockerfile
      - name: Build and Push RAG Service
        uses: docker/build-push-action@v4
        with:
          context: ./rag_service
          push: true
          tags: daniyal142khan/legal-insight-rag:latest

  # ==========================================
  # STAGE 3: CONTINUOUS DEPLOYMENT (AWS UPDATE)
  # ==========================================
  deploy:
    # DEPENDENCY: Only attempts to deploy to AWS if the Docker images 
    # were successfully built and pushed.
    needs: build-and-push 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 1: Secure Copy Protocol (SCP)
      # Uses our AWS SSH key to securely transfer the 'k8s' folder 
      # from the GitHub runner directly onto the AWS EC2 instance.
      - name: Copy K8s files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/*"
          target: "/home/ubuntu/legal-insight-core"

      # Step 2: Remote Execution (SSH)
      # Logs into the AWS server and acts like a human typing in the terminal.
      - name: Execute Kubernetes Commands via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Update Cluster Architecture: Applies any new configurations 
            # (e.g., changes to ConfigMaps, Ingress routes, or Secrets).
            kubectl apply -f /home/ubuntu/legal-insight-core/k8s/
            
            # 2. Zero-Downtime Update: Forces Kubernetes to gracefully terminate 
            # the old pods and spin up new ones. During creation, the new pods 
            # will automatically download the newly built ':latest' Docker images.
            kubectl rollout restart deployment frontend backend rag-service